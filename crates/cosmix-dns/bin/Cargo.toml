[package]
name = "hickory-dns"

description = """
Hickory DNS is a safe and secure DNS server with a variety of protocol features
(DNSSEC, TSIG, SIG(0), DoT, DoQ, DoH). It can be operated as an authoritative
DNS server, forwarding resolver, stub resolver, or a recursive resolver (experimental).
Zone data can be managed in-memory, with flat files, or with an SQLite database.
"""

documentation = "https://docs.rs/hickory-dns"
readme = "README.md"

version = "0.26.0-alpha.1"
authors = ["The contributors to Hickory DNS"]
edition = "2021"
rust-version = "1.88"
homepage = "https://hickory-dns.org/"
repository = "https://github.com/hickory-dns/hickory-dns"
keywords = ["dns", "dnssec"]
categories = ["network-programming"]
license = "MIT OR Apache-2.0"
[features]
default = ["sqlite", "resolver", "rustls-platform-verifier"]

# if enabled, the hickory-dns binary will print ascii-art on start, disable to reduce the binary size
ascii-art = []

blocklist = ["hickory-server/blocklist"]
recursor = ["hickory-server/recursor"]
# Recursive Resolution is Experimental!
resolver = ["hickory-server/resolver"]
sqlite = ["hickory-server/sqlite", "dep:rusqlite"]
prometheus-metrics = ["metrics", "dep:http", "dep:hyper", "dep:hyper-util", "dep:metrics-exporter-prometheus", "dep:tokio-util"]
metrics = ["hickory-server/metrics", "hickory-resolver/metrics", "dep:metrics", "dep:metrics-process"]

tls-aws-lc-rs = ["hickory-server/tls-aws-lc-rs", "hickory-resolver/tls-aws-lc-rs", "__tls"]
https-aws-lc-rs = ["hickory-server/https-aws-lc-rs", "hickory-resolver/https-aws-lc-rs", "tls-aws-lc-rs", "__https"]
quic-aws-lc-rs = ["hickory-server/quic-aws-lc-rs", "hickory-resolver/quic-aws-lc-rs", "tls-aws-lc-rs", "__quic"]

tls-ring = ["hickory-server/tls-ring", "hickory-resolver/tls-ring", "__tls"]
https-ring = ["hickory-server/https-ring", "hickory-resolver/https-ring", "tls-ring", "__https"]
quic-ring = ["hickory-server/quic-ring", "hickory-resolver/quic-ring", "tls-ring", "__quic"]

__tls = ["dep:rustls"]
__https = []
__quic = []

dnssec-aws-lc-rs = ["hickory-server/dnssec-aws-lc-rs", "dep:rustls-pki-types", "__dnssec"]
dnssec-ring = ["hickory-server/dnssec-ring", "dep:rustls-pki-types", "__dnssec"]
__dnssec = []

webpki-roots = ["hickory-server/webpki-roots"]
rustls-platform-verifier = ["hickory-server/rustls-platform-verifier"]

[[bin]]
name = "hickory-dns"
path = "src/hickory-dns.rs"

[dependencies]
# clap features:
# - `suggestions` for advanced help with error in cli
# - `derive` for clap derive api
# - `help` to generate --help
cfg-if = "1"
clap = { version = "4.0", default-features = false, features = ["cargo", "derive", "help", "std", "suggestions"] }
futures-util = { version = "0.3.5", default-features = false, features = ["std"] }
http = { version = "1.1", optional = true }
hyper = { version = "1.6.0", features = ["server"], optional = true }
hyper-util = { version = "0.1.11", features = ["server-auto", "server-graceful", "tokio"], optional = true }
ipnet = { version = "2.3.0", default-features = false, features = ["serde"] }
# rusqlite is actually only needed for test situations, but we need an optional dependency
# here so we can disable it for MSRV tests (rusqlite only supports latest stable)
rusqlite = { version = "0.38", features = ["bundled", "time"], optional = true }
socket2 = "0.6"
rustls = { version = "0.23.23", default-features = false, features = ["logging", "std", "tls12"], optional = true }
rustls-pki-types = { version = "1.10", optional = true }
serde = { version = "1.0", features = ["derive"] }
thiserror = { version = "2", default-features = false }
time = "0.3"
tracing = { version = "0.1.30", default-features = false }
tracing-subscriber = { version = "0.3", default-features = false, features = ["env-filter", "fmt", "std"] }
tokio = { version = "1.21", features = ["rt", "signal", "time"] }
tokio-util = { version = "0.7.9", optional = true }
toml = "1.0.1"
hex = "0.4"
hickory-proto = { version = "0.26.0-alpha.1", path = "../crates/proto", default-features = false, features = ["std"] }
hickory-net = { version = "0.26.0-alpha.1", path = "../crates/net", default-features = false }
hickory-resolver = { version = "0.26.0-alpha.1", path = "../crates/resolver", default-features = false }
hickory-server = { version = "0.26.0-alpha.1", path = "../crates/server", default-features = false, features = ["toml"] }
hostname = "0.4"
metrics = { version = "0.24.1", optional = true }
metrics-exporter-prometheus = { version = "0.18", default-features = false, features = ["http-listener"], optional = true }
metrics-process = { version = "2.4.0", optional = true }

[target.'cfg(unix)'.dependencies]
libc = "0.2"
[dev-dependencies]
bytes = "1"
futures-executor = { version = "0.3.5", default-features = false, features = ["std"] }
regex = { version = "1.3.4", default-features = false }
hickory-proto = { version = "0.26.0-alpha.1", path = "../crates/proto", default-features = false, features = ["std", "testing"] }
hickory-server = { version = "0.26.0-alpha.1", path = "../crates/server", default-features = false, features = ["testing"] }
hickory-resolver = { version = "0.26.0-alpha.1", path = "../crates/resolver", default-features = false }
toml = "1.0.1"
webpki-roots = "1"
# metrics tests
reqwest = { version = "0.13.1", default-features = false }
prometheus-parse = "0.2.5"

[lints.rust]
non_snake_case = "warn"
non_upper_case_globals = "warn"
rust_2018_idioms = "warn"
unexpected_cfgs = { level = "warn", check-cfg = ["cfg(nightly)"] }
unnameable_types = "warn"
unreachable_pub = "warn"
unused_extern_crates = "warn"
unused_import_braces = "warn"
unused_qualifications = "warn"

[lints.clippy]
bool_to_int_with_if = "allow"
default_trait_access = "warn"
manual_let_else = "warn"
or_fun_call = "warn"
single_component_path_imports = "allow"
unimplemented = "warn"
upper_case_acronyms = "allow"
use_self = "warn"
[package.metadata.cargo-all-features]
skip_optional_dependencies = true
max_combination_size = 2
denylist = ["__tls", "__https", "__quic", "__h3", "__dnssec"]
