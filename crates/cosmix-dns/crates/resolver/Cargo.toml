[package]
name = "hickory-resolver"

description = """
hickory-resolver is a safe and secure DNS stub resolver library intended to be a high-level library
for DNS record resolution.
"""

documentation = "https://docs.rs/hickory-resolver"
readme = "README.md"

version = "0.26.0-alpha.1"
authors = ["The contributors to Hickory DNS"]
edition = "2021"
rust-version = "1.88"
homepage = "https://hickory-dns.org/"
repository = "https://github.com/hickory-dns/hickory-dns"
keywords = ["dns", "dnssec"]
categories = ["network-programming"]
license = "MIT OR Apache-2.0"
[features]
default = ["system-config", "tokio"]

tls-aws-lc-rs = ["hickory-net/tls-aws-lc-rs", "__tls"]
https-aws-lc-rs = ["hickory-net/https-aws-lc-rs", "__https"]
quic-aws-lc-rs = ["hickory-net/quic-aws-lc-rs", "__quic", "quinn/rustls-aws-lc-rs"]
h3-aws-lc-rs = ["hickory-net/h3-aws-lc-rs", "__h3"]

tls-ring = ["hickory-net/tls-ring", "__tls"]
https-ring = ["hickory-net/https-ring", "__https"]
quic-ring = ["hickory-net/quic-ring", "__quic", "quinn/rustls-ring"]
h3-ring = ["hickory-net/h3-ring", "__h3"]

__tls = ["dep:rustls", "dep:tokio-rustls", "tokio"]
__https = ["__tls"]
__quic = ["dep:quinn", "__tls"]
__h3 = ["__quic"]

webpki-roots = ["dep:webpki-roots", "hickory-net/webpki-roots"]
rustls-platform-verifier = ["hickory-net/rustls-platform-verifier"]

dnssec-aws-lc-rs = ["hickory-proto/dnssec-aws-lc-rs", "hickory-net/dnssec-aws-lc-rs", "__dnssec"]
dnssec-ring = ["hickory-proto/dnssec-ring", "hickory-net/dnssec-ring", "__dnssec"]
__dnssec = []

recursor = ["dep:async-recursion", "dep:lru-cache", "hickory-proto/text-parsing"]

serde = ["dep:serde", "hickory-proto/serde"]
system-config = ["dep:ipconfig", "dep:resolv-conf", "dep:jni", "dep:ndk-context", "dep:system-configuration"]

toml = ["dep:toml"]

tokio = ["dep:tokio", "tokio/rt", "hickory-net/tokio"]

metrics = ["dep:metrics"]

[dependencies]
async-recursion = { version = "1.0.0", optional = true }
cfg-if = "1"
futures-util = { workspace = true, default-features = false, features = [
    "std",
] }
metrics = { version = "0.24.1", optional = true }
ipnet = { version = "2.3.0", default-features = false, features = ["serde"] }
lru-cache = { version = "0.1.2", optional = true }
moka = { version = "0.12", features = ["sync"] }
once_cell = { version = "1.20.0", default-features = false, features = ["critical-section"] }
parking_lot = "0.12"
quinn = { version = "0.11.2", default-features = false, optional = true, features = [
    "log",
    "runtime-tokio",
] }
rand = { version = "0.10.0", default-features = false, features = ["alloc"] }
resolv-conf = { version = "0.7.0", features = ["system"], optional = true }
rustls = { version = "0.23.23", default-features = false, features = ["logging", "std", "tls12"], optional = true }
serde = { version = "1.0", features = ["derive", "rc"], optional = true }
smallvec = "1.6"
thiserror = { version = "2", default-features = false }
tracing = { version = "0.1.30", default-features = false }
tokio = { version = "1.21", optional = true }
tokio-rustls = { version = "0.26", default-features = false, optional = true }
toml = { version = "1.0.1", optional = true }
hickory-net = { version = "0.26.0-alpha.1", path = "../net", default-features = false }
hickory-proto = { version = "0.26.0-alpha.1", path = "../proto", default-features = false, features = ["access-control", "std"] }
webpki-roots = { version = "1", optional = true }

[target.'cfg(windows)'.dependencies]
ipconfig = { version = "0.3.0", optional = true }

[target.'cfg(target_os = "android")'.dependencies]
jni = { version = "0.22.1", optional = true }
ndk-context = { version = "0.1.1", optional = true }

[target.'cfg(target_vendor = "apple")'.dependencies]
system-configuration = { version = "0.7", optional = true }

[dev-dependencies]
futures-executor = { version = "0.3.5", default-features = false, features = ["std"] }
hickory-proto = { version = "0.26.0-alpha.1", path = "../proto", default-features = false, features = ["std"] }
metrics-util = { version = "0.20.0", default-features = false, features = ["debugging"] }
serde_json = "1"
tokio = { version = "1.21", features = ["macros", "test-util"] }
toml = "1.0.1"
tracing-subscriber = { version = "0.3", default-features = false, features = ["env-filter", "fmt", "std"] }

[package.metadata.docs.rs]
all-features = true
default-target = "x86_64-unknown-linux-gnu"
targets = ["x86_64-apple-darwin", "x86_64-pc-windows-msvc"]
rustdoc-args = ["--cfg", "docsrs"]

[[example]]
name = "custom_provider"
required-features = ["tokio"]

[[example]]
name = "flush_cache"
required-features = ["tokio", "system-config"]

[[example]]
name = "global_resolver"
required-features = ["tokio", "system-config"]

[[example]]
name = "multithreaded_runtime"
required-features = ["tokio", "system-config"]

[lints.rust]
non_snake_case = "warn"
non_upper_case_globals = "warn"
rust_2018_idioms = "warn"
unexpected_cfgs = { level = "warn", check-cfg = ["cfg(nightly)"] }
unnameable_types = "warn"
unreachable_pub = "warn"
unused_extern_crates = "warn"
unused_import_braces = "warn"
unused_qualifications = "warn"

[lints.clippy]
bool_to_int_with_if = "allow"
default_trait_access = "warn"
manual_let_else = "warn"
or_fun_call = "warn"
single_component_path_imports = "allow"
unimplemented = "warn"
upper_case_acronyms = "allow"
use_self = "warn"
[package.metadata.cargo-all-features]
skip_optional_dependencies = true
max_combination_size = 2
denylist = ["__tls", "__https", "__quic", "__h3", "__dnssec"]
