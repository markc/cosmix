[package]
name = "hickory-server"

description = """
hickory-server is a library for integrating safe and secure DNS servers into
an async Tokio application. It supports a variety of protocol features
(DNSSEC, TSIG, SIG(0), DoT, DoQ, DoH). Servers can be operated in an authoritative
role, or as a forwarding resolver, stub resolver, or a recursive resolver
(experimental).
"""

documentation = "https://docs.rs/hickory-server"

readme = "README.md"

version = "0.26.0-alpha.1"
authors = ["The contributors to Hickory DNS"]
edition = "2021"
rust-version = "1.88"
homepage = "https://hickory-dns.org/"
repository = "https://github.com/hickory-dns/hickory-dns"
keywords = ["dns", "dnssec"]
categories = ["network-programming"]
license = "MIT OR Apache-2.0"
[features]
# Recursive Resolution is Experimental!
recursor = ["hickory-resolver/recursor"]
resolver = ["dep:hickory-resolver"]
sqlite = ["rusqlite"]
blocklist = ["resolver"]
toml = ["dep:toml", "hickory-resolver?/toml"]
metrics = ["hickory-resolver?/metrics", "dep:metrics"]

tls-aws-lc-rs = [
    "hickory-net/tls-aws-lc-rs",
    "hickory-resolver?/tls-aws-lc-rs",
    "__tls",
]
https-aws-lc-rs = [
    "hickory-net/https-aws-lc-rs",
    "hickory-resolver?/https-aws-lc-rs",
    "tls-aws-lc-rs",
    "__https",
]
quic-aws-lc-rs = [
    "hickory-net/quic-aws-lc-rs",
    "hickory-resolver?/quic-aws-lc-rs",
    "tls-aws-lc-rs",
    "__quic",
]
h3-aws-lc-rs = [
    "hickory-net/h3-aws-lc-rs",
    "hickory-resolver?/h3-aws-lc-rs",
    "quic-aws-lc-rs",
    "__h3",
]

tls-ring = [
    "hickory-net/tls-ring",
    "hickory-resolver?/tls-ring",
    "__tls",
]
https-ring = [
    "hickory-net/https-ring",
    "hickory-resolver?/https-ring",
    "tls-ring",
    "__https",
]
quic-ring = [
    "hickory-net/quic-ring",
    "hickory-resolver?/quic-ring",
    "tls-ring",
    "__quic",
]
h3-ring = [
    "hickory-net/h3-ring",
    "hickory-resolver?/h3-ring",
    "quic-ring",
    "__h3",
]

__tls = ["dep:rustls", "dep:tokio-rustls"]
__https = ["dep:h2", "dep:http", "__tls"]
__quic = ["__tls"]
__h3 = ["dep:h3", "dep:h3-quinn", "__quic"]

dnssec-aws-lc-rs = ["hickory-proto/dnssec-aws-lc-rs", "hickory-resolver?/dnssec-aws-lc-rs", "serde/rc", "__dnssec"]
dnssec-ring = ["hickory-proto/dnssec-ring", "hickory-resolver?/dnssec-ring", "serde/rc", "__dnssec"]
__dnssec = []

webpki-roots = ["hickory-resolver?/webpki-roots"]
rustls-platform-verifier = ["hickory-resolver?/rustls-platform-verifier"]

testing = []

[dependencies]
async-trait = "0.1.43"
toml = { version = "1.0.1", optional = true }
bytes = "1"
cfg-if = "1"
data-encoding = { version = "2.2.0", default-features = false }
futures-util = { version = "0.3.5", default-features = false, features = ["std"] }
h2 = { version = "0.4.0", features = ["stream"], optional = true }
h3 = { version = "0.0.8", optional = true }
h3-quinn = { version = "0.0.10", optional = true }
http = { version = "1.1", optional = true }
ipnet = { version = "2.3.0", default-features = false, features = ["serde", "std"] }
prefix-trie = "0.8"
rusqlite = { version = "0.38", features = ["bundled", "time"], optional = true }
rustls = { version = "0.23.23", default-features = false, features = ["logging", "std", "tls12"], optional = true }
serde = { version = "1.0", features = ["derive"] }
thiserror = { version = "2", default-features = false }
time = "0.3"
tracing = { version = "0.1.30", default-features = false }
tokio = { version = "1.21", features = ["macros", "net", "sync"] }
tokio-rustls = { version = "0.26", default-features = false, optional = true }
tokio-util = "0.7.9"
hickory-proto = { version = "0.26.0-alpha.1", path = "../proto", default-features = false, features = ["serde", "std", "text-parsing"] }
hickory-net = { version = "0.26.0-alpha.1", path = "../net", default-features = false, features = ["tokio"] }
hickory-resolver = { version = "0.26.0-alpha.1", path = "../resolver", default-features = false, features = ["serde", "system-config", "tokio"], optional = true }
metrics = { version = "0.24.1", optional = true }

[dev-dependencies]
futures-executor = { version = "0.3.5", default-features = false, features = ["std"] }
tokio = { version = "1.21", features = ["macros", "rt"] }
tracing-subscriber = { version = "0.3", default-features = false, features = ["env-filter", "fmt", "std"] }

[package.metadata.docs.rs]
all-features = true
default-target = "x86_64-unknown-linux-gnu"
targets = ["x86_64-apple-darwin", "x86_64-pc-windows-msvc"]
rustdoc-args = ["--cfg", "docsrs"]

[lints.rust]
non_snake_case = "warn"
non_upper_case_globals = "warn"
rust_2018_idioms = "warn"
unexpected_cfgs = { level = "warn", check-cfg = ["cfg(nightly)"] }
unnameable_types = "warn"
unreachable_pub = "warn"
unused_extern_crates = "warn"
unused_import_braces = "warn"
unused_qualifications = "warn"

[lints.clippy]
bool_to_int_with_if = "allow"
default_trait_access = "warn"
manual_let_else = "warn"
or_fun_call = "warn"
single_component_path_imports = "allow"
unimplemented = "warn"
upper_case_acronyms = "allow"
use_self = "warn"
[package.metadata.cargo-all-features]
skip_optional_dependencies = true
max_combination_size = 2
denylist = ["__tls", "__https", "__quic", "__h3", "__dnssec"]
