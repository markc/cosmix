[package]
name = "cosmix-preview"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Component preview and testing app for cosmix-lib-ui"

[[bin]]
name = "cosmix-preview"
path = "src/main.rs"

[features]
default = ["desktop"]
desktop = ["dioxus/desktop", "dep:dioxus-desktop", "dep:tao"]

[dependencies]
dioxus = { version = "0.7", features = [] }
dioxus-desktop = { version = "0.7", optional = true }
tao = { version = "0.34", default-features = false, optional = true }
cosmix_ui = { package = "cosmix-lib-ui", path = "../cosmix-lib-ui", features = ["config"] }
dioxus-primitives = { workspace = true }
mimalloc.workspace = true
serde.workspace = true
serde_json.workspace = true
time = { version = "0.3", features = ["std", "macros"] }
